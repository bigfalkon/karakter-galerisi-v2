<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --bg: #131318; --surface: #201f25; --surface-high: #2a2830;
            --on-bg: #e5e1e6; --on-surface-var: #c8c4d0; --outline-var: #48454e;
            --primary-rgb: 189,179,255; --primary: rgb(var(--primary-rgb));
            --success: #64dcb4; --danger: #f2b8b5; --warn: #ffb74d;
        }
        body { font-family:'Manrope',sans-serif; background:var(--bg); color:var(--on-bg); }
        .row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; font-size:0.78rem; font-family:monospace; }
        .row:nth-child(odd) { background:rgba(255,255,255,0.02); }
        .status { width:18px; height:18px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        .status .material-symbols-outlined { font-size:14px; }
        .waiting .status { background:var(--outline-var); }
        .testing .status { background:var(--primary); animation:pulse 1s infinite; }
        .ok .status { background:var(--success); }
        .fail .status { background:var(--danger); }
        .slow .status { background:var(--warn); }
        .stuck .status { background:#ff5252; animation:pulse 0.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .url-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .time { width:70px; text-align:right; flex-shrink:0; font-weight:700; }
        .size { width:70px; text-align:right; flex-shrink:0; color:var(--on-surface-var); }
        .tag { font-size:0.65rem; padding:1px 6px; border-radius:4px; font-weight:700; flex-shrink:0; }
        #results { max-height:70vh; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--outline-var) transparent; }
        .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:12px; font-weight:700; font-size:0.875rem; cursor:pointer; transition:all 0.2s; border:none; }
        .btn:disabled { opacity:0.4; cursor:not-allowed; }
        .btn-primary { background:var(--primary); color:#2d235c; }
        .btn-secondary { background:var(--surface-high); color:var(--on-surface-var); border:1px solid var(--outline-var); }
        .summary-card { background:var(--surface-high); border-radius:12px; padding:12px 16px; text-align:center; }
        .summary-card .num { font-size:1.8rem; font-weight:800; }
        .summary-card .label { font-size:0.7rem; color:var(--on-surface-var); text-transform:uppercase; letter-spacing:0.05em; }
    </style>
</head>
<body class="p-4 sm:p-6">
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-extrabold mb-1" style="color:var(--primary)">Cache Diagnostic</h1>
    <p class="text-sm mb-4" style="color:var(--on-surface-var)">Tests every image URL one by one to find which ones are blocking</p>

    <div class="flex gap-2 mb-4 flex-wrap">
        <button id="start-btn" class="btn btn-primary">
            <span class="material-symbols-outlined" style="font-size:18px">play_arrow</span> Start Test
        </button>
        <button id="stop-btn" class="btn btn-secondary" disabled>
            <span class="material-symbols-outlined" style="font-size:18px">stop</span> Stop
        </button>
        <div class="flex items-center gap-2 ml-4">
            <label class="text-sm font-semibold" style="color:var(--on-surface-var)">Timeout:</label>
            <select id="timeout-select" class="px-3 py-2 rounded-lg text-sm" style="background:var(--surface-high);border:1px solid var(--outline-var);color:var(--on-bg)">
                <option value="5000">5s</option>
                <option value="8000" selected>8s</option>
                <option value="12000">12s</option>
                <option value="20000">20s</option>
            </select>
        </div>
    </div>

    <div id="summary" class="hidden mb-4">
        <div class="flex gap-2 flex-wrap">
            <div class="summary-card"><div class="num" id="s-total">0</div><div class="label">Total</div></div>
            <div class="summary-card"><div class="num" style="color:var(--success)" id="s-ok">0</div><div class="label">OK</div></div>
            <div class="summary-card"><div class="num" style="color:var(--warn)" id="s-slow">0</div><div class="label">Slow (&gt;3s)</div></div>
            <div class="summary-card"><div class="num" style="color:var(--danger)" id="s-fail">0</div><div class="label">Failed</div></div>
            <div class="summary-card"><div class="num" style="color:#ff5252" id="s-stuck">0</div><div class="label">Stuck</div></div>
        </div>
        <div class="mt-2 h-1.5 rounded bg-gray-800 overflow-hidden">
            <div id="progress" class="h-full rounded transition-all" style="width:0%;background:linear-gradient(90deg,var(--primary),var(--success))"></div>
        </div>
        <p id="progress-text" class="text-xs text-right mt-1" style="color:var(--on-surface-var)"></p>
    </div>

    <div id="results" class="rounded-xl overflow-hidden" style="border:1px solid var(--outline-var)"></div>
    <p id="loading-msg" class="text-center py-8" style="color:var(--on-surface-var)">Loading character data from Firestore…</p>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDAmMtRBGyNOb6R2ZjSZrhN5NnGA_p-L3w",
    authDomain: "character-gallery-e23ee.firebaseapp.com",
    projectId: "character-gallery-e23ee",
    storageBucket: "character-gallery-e23ee.firebasestorage.app",
    messagingSenderId: "737596044949",
    appId: "1:737596044949:web:5ddf2bda9fcfce9f990d9c"
};
const db = firebase.firestore();

let allUrls = [];
let stopped = false;
let counts = { total:0, ok:0, slow:0, fail:0, stuck:0 };

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
    const [cs, ds] = await Promise.all([
        db.collection('characters').get(),
        db.collection('dismissed').get(),
    ]);
    const chars = cs.docs.map(d => ({ id:d.id, ...d.data() }));
    const dismissed = ds.docs.map(d => ({ id:d.id, ...d.data() }));
    const all = [...chars, ...dismissed];

    // Build entries with metadata (charName, field type)
    const entries = [];
    const seen = new Set();

    function add(url, charName, label) {
        if (!url || typeof url !== 'string') return;
        url = url.replace(/[?&]_t=\d+/g, '').replace(/\?&/,'?').replace(/\?$/,'');
        if (seen.has(url)) return;
        seen.add(url);
        entries.push({ url, charName, label });
    }

    all.forEach(c => {
        const name = c.name || c.id;
        add(c.imageUrl, name, c.isFusion ? 'fusion-gif' : '1★');
        if (c.isFusion && c.previewUrl) add(c.previewUrl, name, 'fusion-preview');
        (c.evolutions||[]).forEach(e => add(e.imageUrl, name, `${e.star}★`));
        const auData = c.auData || {};
        Object.entries(auData).forEach(([auId, entry]) => {
            if (entry.maxStarImageUrl) add(entry.maxStarImageUrl, name, `AU:${auId}`);
            if (entry.star3ImageUrl)  add(entry.star3ImageUrl,  name, `AU:${auId}`);
            if (entry.fusionImageUrl) add(entry.fusionImageUrl, name, `AU:${auId}-f`);
        });
    });

    return entries;
}

// ── Render a row ─────────────────────────────────────────────────────────────
function renderRow(entry, idx) {
    const host = (() => { try { return new URL(entry.url).hostname; } catch { return '?'; } })();
    const isGif = entry.url.toLowerCase().includes('.gif');
    return `<div class="row waiting" id="row-${idx}">
        <div class="status"></div>
        <span class="tag" style="background:${isGif?'rgba(255,183,77,0.15);color:var(--warn)':'rgba(var(--primary-rgb),0.1);color:var(--primary)'}">${isGif?'GIF':'IMG'}</span>
        <span class="tag" style="background:rgba(255,255,255,0.05);color:var(--on-surface-var)">${entry.label}</span>
        <span class="url-text" title="${entry.url}"><strong>${entry.charName}</strong> — ${host}</span>
        <span class="size" id="size-${idx}">—</span>
        <span class="time" id="time-${idx}">—</span>
    </div>`;
}

// ── Test a single URL ────────────────────────────────────────────────────────
async function testUrl(entry, idx, timeoutMs) {
    const row = document.getElementById(`row-${idx}`);
    const timeEl = document.getElementById(`time-${idx}`);
    const sizeEl = document.getElementById(`size-${idx}`);

    row.className = 'row testing';
    const start = performance.now();

    // Update time live while downloading
    const liveTimer = setInterval(() => {
        const elapsed = Math.round(performance.now() - start);
        timeEl.textContent = elapsed + 'ms';
        if (elapsed > timeoutMs) {
            timeEl.style.color = '#ff5252';
        } else if (elapsed > 3000) {
            timeEl.style.color = 'var(--warn)';
        }
    }, 200);

    try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);

        const res = await fetch(entry.url, { signal: controller.signal });
        clearTimeout(timer);

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        // Read full body to measure real download time
        const blob = await res.blob();
        const elapsed = Math.round(performance.now() - start);

        clearInterval(liveTimer);
        timeEl.textContent = elapsed + 'ms';
        sizeEl.textContent = formatSize(blob.size);

        if (elapsed > 3000) {
            row.className = 'row slow';
            timeEl.style.color = 'var(--warn)';
            counts.slow++;
        } else {
            row.className = 'row ok';
            timeEl.style.color = 'var(--success)';
            counts.ok++;
        }
    } catch (e) {
        const elapsed = Math.round(performance.now() - start);
        clearInterval(liveTimer);
        timeEl.textContent = elapsed + 'ms';

        if (e.name === 'AbortError') {
            row.className = 'row stuck';
            timeEl.textContent = 'TIMEOUT';
            timeEl.style.color = '#ff5252';
            counts.stuck++;
        } else {
            row.className = 'row fail';
            timeEl.textContent = e.message;
            timeEl.style.color = 'var(--danger)';
            counts.fail++;
        }
    }
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1048576) return (bytes/1024).toFixed(0) + 'KB';
    return (bytes/1048576).toFixed(1) + 'MB';
}

function updateSummary(done, total) {
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-ok').textContent = counts.ok;
    document.getElementById('s-slow').textContent = counts.slow;
    document.getElementById('s-fail').textContent = counts.fail;
    document.getElementById('s-stuck').textContent = counts.stuck;
    const pct = Math.round((done/total)*100);
    document.getElementById('progress').style.width = pct+'%';
    document.getElementById('progress-text').textContent = `${done}/${total} (${pct}%)`;
}

// ── Main ─────────────────────────────────────────────────────────────────────
async function init() {
    try {
        const entries = await loadData();
        allUrls = entries;
        document.getElementById('loading-msg').textContent = `${entries.length} unique image URLs found. Press Start to test.`;
        document.getElementById('results').innerHTML = entries.map((e,i) => renderRow(e,i)).join('');
    } catch(e) {
        document.getElementById('loading-msg').textContent = 'Error: ' + e.message;
    }
}

document.getElementById('start-btn').addEventListener('click', async () => {
    if (!allUrls.length) return;

    stopped = false;
    counts = { total:allUrls.length, ok:0, slow:0, fail:0, stuck:0 };
    const timeoutMs = parseInt(document.getElementById('timeout-select').value);

    document.getElementById('start-btn').disabled = true;
    document.getElementById('stop-btn').disabled = false;
    document.getElementById('summary').classList.remove('hidden');

    // Reset all rows
    allUrls.forEach((_, i) => {
        const row = document.getElementById(`row-${i}`);
        if (row) row.className = 'row waiting';
        const t = document.getElementById(`time-${i}`);
        const s = document.getElementById(`size-${i}`);
        if (t) { t.textContent = '—'; t.style.color = ''; }
        if (s) s.textContent = '—';
    });

    // Test one by one so we can see exactly where it stalls
    for (let i = 0; i < allUrls.length; i++) {
        if (stopped) break;

        // Scroll to current row
        const row = document.getElementById(`row-${i}`);
        if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

        await testUrl(allUrls[i], i, timeoutMs);
        updateSummary(i + 1, allUrls.length);
    }

    document.getElementById('start-btn').disabled = false;
    document.getElementById('stop-btn').disabled = true;

    if (stopped) {
        document.getElementById('progress-text').textContent += ' (stopped)';
    }
});

document.getElementById('stop-btn').addEventListener('click', () => { stopped = true; });

init();
</script>
</body>
</html>
